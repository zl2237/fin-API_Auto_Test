# ============================================================
# pytest 标记配置文件
# ============================================================
#
# 使用方式：
#   - 设置 true/false 控制是否启用该标记的测试
#   - 仅在不带 -m 参数运行时生效（pytest 会自动读取此配置）
#   - 带 -m 参数时，命令行优先级高于此配置
#
# 运行优先级：
#   pytest           → 使用 YAML 配置过滤
#   pytest -m xxx   → 命令行说了算，忽略 YAML
#
# ============================================================

# ========== 按测试类型分类 ==========
test_type:
  # 冒烟测试 - 核心功能快速验证
  smoke: true

  # 回归测试 - 完整功能验证
  regression: true

  # 完整流程测试 - 端到端测试
  full_flow: true


# ========== 按订单操作分类 ==========
order_operations:
  # 查询类测试
  order_query: true

  # 新增订单
  order_create: true

  # 分发订单
  order_distribute: true

  # 提交订单
  order_submit: true

  # 完整流程（新增→分发→提交）
  order_workflow: true


# ========== 按接口模块分类 ==========
api_modules:
  # 委托订单相关
  entrusted_order: true

  # 业务订单相关
  business_order: true

  # 数据验证相关
  data_validation: true


# ========== 按测试优先级分类 ==========
priority:
  # P0 - 核心业务流程
  critical: true

  # P1 - 重要功能
  normal: true

  # P2 - 一般功能
  minor: false

[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest 运行选项
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=report/allure-results
    --clean-alluredir

# ============================================================
# pytest 标记定义
# ============================================================
# 使用方式：
#   - pytest -m smoke              # 运行冒烟测试
#   - pytest -m "order and not submit"  # 运行订单测试（排除提交）
#   - pytest -m "smoke or regression"  # 运行冒烟或回归
# ============================================================

markers =

    # ---------- 按测试类型分类 ----------
    smoke: 冒烟测试 - 核心功能快速验证
    regression: 回归测试 - 完整功能验证
    full_flow: 完整流程测试 - 端到端测试

    # ---------- 按订单操作分类 ----------
    order_query: 查询类测试
    order_create: 新增订单测试
    order_distribute: 分发订单测试
    order_submit: 提交订单测试
    order_workflow: 完整流程测试（新增→分发→提交）

    # ---------- 按接口模块分类 ----------
    entrusted_order: 委托订单相关测试
    business_order: 业务订单相关测试
    data_validation: 数据验证相关测试

    # ---------- 按优先级分类 ----------
    critical: P0 - 核心业务流程
    normal: P1 - 重要功能
    minor: P2 - 一般功能

[pytest]
testpaths = testcases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=report/allure-results

markers =
    entrust: 委托订单列表查询
    business: 业务订单列表查询
    validation: 数据完整性验证
    add: 新增订单
    distribute: 分发订单
    submit: 提交订单
    workflow: 完整订单流程
